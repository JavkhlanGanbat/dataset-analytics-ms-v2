server:
  port: 8082

spring:
  application:
    name: analytics-service

services:
  dataset:
    base-url: ${DATASET_SERVICE_URL:http://localhost:8081}
    connect-timeout-ms: ${DATASET_SERVICE_CONNECT_TIMEOUT_MS:1000}
    timeout-ms: ${DATASET_SERVICE_TIMEOUT_MS:2000}
    retry-max-attempts: ${DATASET_SERVICE_RETRY_MAX_ATTEMPTS:2}
    retry-wait-ms: ${DATASET_SERVICE_RETRY_WAIT_MS:150}
    circuit-breaker-failure-rate-threshold: ${DATASET_SERVICE_CB_FAILURE_RATE_THRESHOLD:50}
    circuit-breaker-sliding-window-size: ${DATASET_SERVICE_CB_SLIDING_WINDOW_SIZE:5}
    circuit-breaker-minimum-number-of-calls: ${DATASET_SERVICE_CB_MINIMUM_CALLS:3}
    circuit-breaker-wait-duration-ms: ${DATASET_SERVICE_CB_WAIT_DURATION_MS:10000}
    circuit-breaker-permitted-calls-in-half-open-state: ${DATASET_SERVICE_CB_HALF_OPEN_CALLS:2}

management:
  endpoints:
    web:
      exposure:
        include: health,info
