server:
  port: 8081

spring:
  application:
    name: dataset-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/datasets}
    username: ${SPRING_DATASOURCE_USERNAME:dataset_user}
    password: ${SPRING_DATASOURCE_PASSWORD:dataset_pass}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
